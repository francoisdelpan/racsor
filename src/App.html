<script>
  const state = {
    bootstrap: null,
    currentView: 'dashboard',
    currentContract: null,
    pickupContract: null,
    driveReturnContract: null,
    savReturnContract: null,
    pickupContracts: [],
    driveReturnContracts: [],
    savReturnContracts: [],
    inventoryDate: null,
    stockMatrix: null,
    stockMatrixStartDate: null,
    stockMatrixHiddenProducts: {},
    periodAvailability: [],
    periodAvailabilityKey: '',
    stockMatrixLoading: false,
    periodAvailabilityLoading: false,
    uploadTargetContractId: null,
    uploadTargetMode: 'document',
    loadingCount: 0,
    viewLoadToken: 0,
    adminSection: 'products',
    adminDataLoaded: false
  };

  function runServer(fnName, ...args) {
    showLoader();
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(result => {
          hideLoader();
          resolve(result);
        })
        .withFailureHandler(error => {
          hideLoader();
          reject(new Error(error.message || error));
        })
        [fnName](...args);
    });
  }

  function runServerBackground(fnName, ...args) {
    return new Promise((resolve, reject) => {
      google.script.run
        .withSuccessHandler(resolve)
        .withFailureHandler(error => reject(new Error(error.message || error)))
        [fnName](...args);
    });
  }

  async function boot() {
    setStatus('Chargement des donnees...');
    state.bootstrap = await runServer('getAppBootstrapData');
    render();
    setStatus('Application prete.');
  }

  function showLoader() {
    state.loadingCount += 1;
    const overlay = document.getElementById('global-loader');
    if (overlay) {
      overlay.classList.add('is-visible');
    }
  }

  function hideLoader() {
    state.loadingCount = Math.max(0, state.loadingCount - 1);
    const overlay = document.getElementById('global-loader');
    if (overlay && state.loadingCount === 0) {
      overlay.classList.remove('is-visible');
    }
  }

  function setStatus(message) {
    const el = document.getElementById('status-line');
    if (el) {
      el.textContent = message;
    }
    showSnackbar(message);
  }

  function showSnackbar(message) {
    if (!message) {
      return;
    }
    const root = document.getElementById('snackbar-root');
    if (!root) {
      return;
    }
    root.innerHTML = `<div class="snackbar is-visible">${escapeHtml(message)}</div>`;
    window.clearTimeout(showSnackbar.timeoutId);
    showSnackbar.timeoutId = window.setTimeout(() => {
      root.innerHTML = '';
    }, 3200);
  }

  function formatCurrency(value) {
    return new Intl.NumberFormat('fr-FR', { style: 'currency', currency: 'EUR' }).format(parseNumeric(value));
  }

  function parseNumeric(value) {
    if (typeof value === 'number') {
      return Number.isFinite(value) ? value : 0;
    }
    if (value === null || value === undefined || value === '') {
      return 0;
    }
    const normalized = String(value).replace(/\s/g, '').replace(',', '.');
    const parsed = Number(normalized);
    return Number.isFinite(parsed) ? parsed : 0;
  }

  function formatDateShort(value, withWeekday = false) {
    if (!value) {
      return '';
    }
    const date = new Date(value);
    return new Intl.DateTimeFormat('fr-FR', {
      weekday: withWeekday ? 'short' : undefined,
      day: '2-digit',
      month: '2-digit',
      year: '2-digit'
    }).format(date);
  }

  function render() {
    const app = document.getElementById('app');
    const user = state.bootstrap.user;
    const logo = state.bootstrap.settings.logoUrl
      ? `<img class="brand-logo-image" src="${escapeHtml(state.bootstrap.settings.logoUrl)}" alt="Logo Carrefour">`
      : 'C';
    app.innerHTML = `
      <div id="global-loader" class="loader-overlay ${state.loadingCount ? 'is-visible' : ''}">
        <div class="loader-card">
          <div class="loader-spinner"></div>
          <p>Chargement...</p>
        </div>
      </div>
      <div class="shell">
        <header class="topbar">
          <div class="brand">
            <div class="brand-mark">${logo}</div>
            <div>
              <h1>LOCATION MATERIEL</h1>
              <p>Rental Assets & Contract System for Operations & Returns</p>
            </div>
          </div>
          <div class="topbar-meta">
            <button class="button button-secondary button-compact" onclick="refreshAllData()" title="Rafraichir les donnees">↻</button>
            <strong>${escapeHtml(user.role)}</strong> · ${escapeHtml(user.email || 'Utilisateur non resolu')}
          </div>
        </header>
        <div class="layout">
          <aside class="sidebar">
            ${renderSidebar()}
          </aside>
          <main class="content">
            <div id="status-line" class="status-line"></div>
            <div id="snackbar-root" class="snackbar-root"></div>
            ${renderView()}
          </main>
        </div>
      </div>
    `;
    if (state.currentView === 'new-contract') {
      ensureContractItems();
      hydratePeriodAvailabilityUi();
    }
    if (state.currentView === 'drive-return' && state.driveReturnContract) {
      initializeReturnForm();
    }
  }

  function renderSidebar() {
    const role = state.bootstrap.user.role;
    return `
      <div class="nav-group">
        <div class="nav-group-title">Pilotage</div>
        ${navButton('dashboard', 'Dashboard')}
        ${navButton('stock', 'Fiches de stock')}
        ${navButton('inventory', 'Inventaire')}
      </div>
      ${(role === 'RESP' || role === 'SAV') ? `
        <div class="nav-group">
          <div class="nav-group-title">SAV</div>
          ${navButton('new-contract', 'Nouvelle location')}
          ${navButton('sav-return', 'Retour SAV')}
        </div>
      ` : ''}
      ${(role === 'RESP' || role === 'DRIVE') ? `
        <div class="nav-group">
          <div class="nav-group-title">Drive</div>
          ${navButton('drive-pickup', 'Enlevement')}
          ${navButton('drive-return', 'Retour DRIVE')}
        </div>
      ` : ''}
      ${role === 'RESP' ? `
        <div class="nav-group">
          <div class="nav-group-title">Administration</div>
          ${navButton('admin', 'Admin')}
        </div>
      ` : ''}
    `;
  }

  function navButton(view, label) {
    const active = state.currentView === view ? 'is-active' : '';
    return `<button class="nav-button ${active}" onclick="switchView('${view}')">${label}</button>`;
  }

  function renderView() {
    switch (state.currentView) {
      case 'new-contract':
        return renderNewContractView();
      case 'stock':
        return renderStockView();
      case 'inventory':
        return renderInventoryView();
      case 'drive-pickup':
        return renderDrivePickupView();
      case 'drive-return':
        return renderDriveReturnView();
      case 'sav-return':
        return renderSavReturnView();
      case 'admin':
        return renderAdminView();
      default:
        return renderDashboardView();
    }
  }

  function renderDashboardView() {
    const dashboard = state.bootstrap.dashboard;
    return `
      <section class="panel">
        <div class="panel-title">
          <h2>Dashboard</h2>
          <div class="button-row">
            ${state.bootstrap.settings.calendarId ? `<a class="button button-secondary" href="https://calendar.google.com/calendar/u/0/r?cid=${encodeURIComponent(state.bootstrap.settings.calendarId)}" target="_blank">Ouvrir Calendar</a>` : ''}
          </div>
        </div>
        <div class="kpis">
          <div class="kpi kpi-blue"><p>Produits suivis</p><h3>${dashboard.stock.length}</h3></div>
          <div class="kpi kpi-orange"><p>Enlevements du jour</p><h3>${dashboard.pickupsTodayCount || 0}</h3><small>${dashboard.pickupsFutureCount || 0} a venir ensuite</small></div>
          <div class="kpi kpi-green"><p>Retours du jour</p><h3>${dashboard.returnsTodayCount || 0}</h3><small>${dashboard.returnsFutureCount || 0} a venir ensuite</small></div>
          <div class="kpi kpi-red"><p>Alertes ouvertes</p><h3>${dashboard.incidents.length + dashboard.late.length}</h3></div>
        </div>
        <div class="grid-2">
          <div class="panel">
            <div class="panel-title"><h3>Stock du jour · ${formatDateShort(dashboard.today, true)}</h3></div>
            ${renderStockSummaryTable(dashboard.stock)}
          </div>
          <div class="panel">
            <div class="panel-title"><h3>Retours et alertes</h3></div>
            ${renderContractList(dashboard.returns.concat(dashboard.late).slice(0, 10))}
          </div>
        </div>
        ${dashboard.stockAlerts && dashboard.stockAlerts.length ? `
          <div class="panel">
            <div class="panel-title"><h3>Alertes stock negatif</h3></div>
            <table>
              <thead><tr><th>Produit</th><th>Stock</th></tr></thead>
              <tbody>
                ${dashboard.stockAlerts.map(item => `<tr><td>${escapeHtml(item.product_name)}</td><td class="validation-error">${item.available}</td></tr>`).join('')}
              </tbody>
            </table>
          </div>
        ` : ''}
        <div class="panel">
          <div class="panel-title"><h3>Derniers contrats crees</h3></div>
          ${renderRecentContractsTable(dashboard.recentContracts || [])}
        </div>
      </section>
    `;
  }

  function renderStockSummaryTable(stock) {
    return `
      <table>
        <thead>
          <tr><th>Produit</th><th>Disponible</th></tr>
        </thead>
        <tbody>
          ${stock.map(item => `
            <tr>
              <td>${escapeHtml(item.product_name)}</td>
              <td>${item.available}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderContractList(items) {
    if (!items.length) {
      return '<p class="muted">Aucun element a afficher.</p>';
    }
    return `
      <table>
        <thead>
          <tr><th>Contrat</th><th>Client</th><th>Dates</th><th>Statut</th></tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td>${escapeHtml(item.contract_number)}</td>
              <td>${escapeHtml(item.client_full_name)}</td>
              <td>${escapeHtml(formatDateShort(item.pickup_date, true))} / ${escapeHtml(formatDateShort(item.return_date, true))}</td>
              <td><span class="tag tag-${escapeHtml(item.status)}">${escapeHtml(item.status)}</span></td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderRecentContractsTable(items) {
    if (!items.length) {
      return '<p class="muted">Aucun contrat a afficher.</p>';
    }
    return `
      <table>
        <thead>
          <tr><th>Contrat</th><th>Client</th><th>Contact</th><th>Statut</th><th></th></tr>
        </thead>
        <tbody>
          ${items.map(item => `
            <tr>
              <td>${escapeHtml(item.contract_number)}</td>
              <td>${escapeHtml(item.client_full_name)}</td>
              <td>${escapeHtml([item.client_phone, item.client_email].filter(Boolean).join(' / ') || '-')}</td>
              <td><span class="tag tag-${escapeHtml(item.status)}">${escapeHtml(item.status)}</span></td>
              <td>
                <div class="inline-actions">
                  ${item.drive_folder_url ? `<a class="button button-secondary" href="${escapeHtml(item.drive_folder_url)}" target="_blank">Dossier</a>` : ''}
                  ${item.status === 'draft' ? `<button class="button button-accent" onclick="triggerDashboardSignedUpload('${item.id}')">Televerser signe</button>` : ''}
                  ${item.status === 'draft' ? `<button class="button button-secondary" onclick="forceDashboardSigned('${item.id}')">Forcer SIGNED</button>` : ''}
                  ${item.status === 'ready_to_close' ? `<button class="button button-primary" onclick="closeDashboardContract('${item.id}')">Cloturer</button>` : ''}
                  <button class="button button-secondary" onclick="triggerDashboardUpload('${item.id}')">Ajouter une piece</button>
                </div>
              </td>
            </tr>
          `).join('')}
        </tbody>
      </table>
      <input id="dashboard-upload-input" class="hidden" type="file" onchange="uploadDashboardDocument(event)">
      <input id="dashboard-signed-upload-input" class="hidden" type="file" onchange="uploadDashboardSignedDocument(event)">
    `;
  }

  function renderNewContractView() {
    const datesSelected = hasContractDatesSelected();
    return `
      <section class="panel">
        <div class="panel-title">
          <h2>Nouvelle location</h2>
        </div>
        <form id="contract-form" onsubmit="event.preventDefault(); submitContractForm();">
          <div class="form-grid">
            <div class="field"><label>Prenom client</label><input name="client_first_name" required></div>
            <div class="field"><label>Nom client</label><input name="client_last_name" required></div>
            <div class="field field-full"><label>Adresse client</label><input name="client_address"></div>
            <div class="field field-full"><label>Code postal / Ville</label><input name="client_zipcity"></div>
            <div class="field"><label>Telephone</label><input name="client_phone"></div>
            <div class="field"><label>Email</label><input name="client_email" type="email"></div>
            <div class="field"><label>Date retrait</label><input name="pickup_date" type="date" required onchange="refreshPeriodAvailability()"></div>
            <div class="field"><label>Heure retrait</label><input name="pickup_hour" type="time" value="09:00" required></div>
            <div class="field"><label>Date retour</label><input name="return_date" type="date" required onchange="refreshPeriodAvailability()"></div>
            <div class="field"><label>Heure retour</label><input name="return_hour" type="time" value="09:00" required></div>
            <div class="field field-full">
              <label>Produits</label>
              <div id="contract-items"></div>
              <div class="button-row">
                <button type="button" class="button button-secondary" onclick="addContractItemRow()">Ajouter un produit</button>
                <button type="button" class="button button-secondary" onclick="previewQuote()">Previsualiser le montant</button>
              </div>
            </div>
          </div>
          <div class="quote-box" id="quote-preview">
            ${datesSelected ? 'Selectionne les produits puis previsualise le montant.' : 'Selectionne d abord les dates pour afficher le stock theorique de la periode.'}
          </div>
          <div class="button-row" style="margin-top:16px;">
            <button type="submit" class="button button-primary" ${datesSelected ? '' : 'disabled'}>Creer le contrat</button>
          </div>
        </form>
      </section>
      <section class="panel">
        <div class="panel-title">
          <h2>Stock theorique sur la periode</h2>
          <span class="muted">Stock disponible sur la plage choisie</span>
        </div>
        <div id="period-availability-panel">
          ${renderPeriodAvailability()}
        </div>
      </section>
      ${state.currentContract ? renderCurrentContractPanel() : ''}
    `;
  }

  function renderPeriodAvailability() {
    if (!hasContractDatesSelected()) {
      return '<p class="muted">Choisis une date de retrait et une date de retour pour debloquer les quantites et afficher le stock theorique.</p>';
    }
    if (state.periodAvailabilityLoading) {
      return '<p class="muted">Chargement du stock disponible...</p>';
    }
    if (!state.periodAvailability.length) {
      return '<p class="muted">Calcul du stock theorique en attente...</p>';
    }
    return `
      <table>
        <thead>
          <tr><th>Produit</th><th>Disponible</th></tr>
        </thead>
        <tbody>
          ${state.periodAvailability.map(item => `
            <tr>
              <td>${escapeHtml(item.product_name)}</td>
              <td>${item.available}</td>
            </tr>
          `).join('')}
        </tbody>
      </table>
    `;
  }

  function renderCurrentContractPanel() {
    const transaction = state.currentContract.transaction;
    return `
      <section class="panel">
        <div class="panel-title">
          <h2>Contrat courant</h2>
          <span class="tag tag-${escapeHtml(transaction.status)}">${escapeHtml(transaction.status)}</span>
        </div>
        <p><strong>${escapeHtml(transaction.contract_number)}</strong> · ${escapeHtml(transaction.client_full_name)}</p>
        <p class="muted">Montant TTC: ${formatCurrency(transaction.total_amount_ttc)} · Caution: ${formatCurrency(transaction.total_deposit_amount)}</p>
        <p class="muted">
          ${transaction.drive_folder_url ? `<a href="${escapeHtml(transaction.drive_folder_url)}" target="_blank">Ouvrir le dossier Drive</a>` : 'Dossier Drive non configure'}
          ${transaction.generated_contract_url ? ` · <a href="${escapeHtml(transaction.generated_contract_url)}" target="_blank">Imprimer le contrat</a>` : ''}
          ${transaction.signed_contract_url ? ` · <a href="${escapeHtml(transaction.signed_contract_url)}" target="_blank">Contrat signe</a>` : ''}
        </p>
        <div class="inline-actions">
          <button class="button button-accent" onclick="document.getElementById('signed-upload').click()">Televerser contrat signe</button>
          <input id="signed-upload" class="hidden" type="file" onchange="uploadSignedContract(event)">
          <button class="button button-secondary" onclick="endContractCreation()">Terminer la creation de contrat</button>
          <button class="button button-danger" onclick="cancelCurrentContract()">Annuler le contrat</button>
        </div>
      </section>
    `;
  }

  function renderDrivePickupView() {
    return `
      <section class="panel">
        <div class="panel-title"><h2>Enlevement</h2></div>
        <div class="button-row">
          <input id="pickup-contract-number" placeholder="Numero de contrat">
          <button class="button button-primary" onclick="searchContractForContext('pickup')">Rechercher</button>
        </div>
      </section>
      <section class="panel">
        <div class="panel-title"><h2>Contrats prets au retrait</h2></div>
        ${renderQuickContractPicker(state.pickupContracts, 'pickup')}
      </section>
      ${state.pickupContract ? renderPickupContractPanel() : ''}
    `;
  }

  function renderPickupContractPanel() {
    const transaction = state.pickupContract.transaction;
    return `
      <section class="panel">
        <div class="panel-title">
          <h2>${escapeHtml(transaction.contract_number)} · ${escapeHtml(transaction.client_full_name)}</h2>
          <span class="tag tag-${escapeHtml(transaction.status)}">${escapeHtml(transaction.status)}</span>
        </div>
        <p class="muted">Retrait prevu: ${escapeHtml(formatDateShort(transaction.pickup_date, true))} ${escapeHtml(transaction.pickup_hour || '')}</p>
        <p class="muted">
          ${transaction.signed_contract_url ? `<a href="${escapeHtml(transaction.signed_contract_url)}" target="_blank">Ouvrir le contrat signe</a>` : 'Contrat signe non disponible'}
          ${transaction.drive_folder_url ? ` · <a href="${escapeHtml(transaction.drive_folder_url)}" target="_blank">Ouvrir le dossier</a>` : ''}
        </p>
        <div class="inline-actions">
          <button class="button button-primary" onclick="markPickedUp()">Confirmer le depart des marchandises</button>
        </div>
      </section>
    `;
  }

  function renderDriveReturnView() {
    return `
      <section class="panel">
        <div class="panel-title"><h2>Retour DRIVE</h2></div>
        <div class="button-row">
          <input id="drive-return-contract-number" placeholder="Numero de contrat">
          <button class="button button-primary" onclick="searchContractForContext('driveReturn')">Rechercher</button>
        </div>
      </section>
      <section class="panel">
        <div class="panel-title"><h2>Retours a controler</h2></div>
        ${renderQuickContractPicker(state.driveReturnContracts, 'driveReturn')}
      </section>
      ${state.driveReturnContract ? renderDriveReturnPanel() : ''}
    `;
  }

  function renderDriveReturnPanel() {
    const contract = state.driveReturnContract;
    const transaction = contract.transaction;
    const states = state.bootstrap.referenceData.returnStates;
    return `
      <section class="panel">
        <div class="panel-title">
          <h2>${escapeHtml(transaction.contract_number)} · ${escapeHtml(transaction.client_full_name)}</h2>
          <span class="tag tag-${escapeHtml(transaction.status)}">${escapeHtml(transaction.status)}</span>
        </div>
        <p class="muted">Retour prevu: ${escapeHtml(formatDateShort(transaction.return_date, true))} ${escapeHtml(transaction.return_hour || '')}</p>
      </section>
      <section class="panel">
        <div class="panel-title"><h2>Controle qualite</h2></div>
        <form id="return-form" onsubmit="event.preventDefault(); submitReturn();">
          ${contract.items.map(item => `
            <div class="panel inset-panel" data-return-row="${item.product_id}" data-rented-qty="${item.quantity}">
              <h3>${escapeHtml(item.product_label_snapshot)} · Qté louee ${item.quantity}</h3>
              <div class="state-grid">
                ${states.map(stateItem => `
                  <div class="field compact-field">
                    <label>${escapeHtml(stateItem.label)}</label>
                    <input type="number" min="0" value="${stateItem.label === 'conforme' ? item.quantity : 0}"
                      data-product-id="${item.product_id}"
                      data-state-id="${stateItem.id}"
                      data-state-label="${escapeHtml(stateItem.label)}"
                      ${stateItem.label === 'conforme' ? 'data-auto-conforme="true" readonly' : `oninput="syncReturnRow('${item.product_id}')"`}>
                  </div>
                `).join('')}
              </div>
              <div class="row-validation muted" data-return-validation="${item.product_id}"></div>
              <div class="field" style="margin-top:12px;">
                <label>Commentaire</label>
                <textarea data-comment-product-id="${item.product_id}"></textarea>
              </div>
            </div>
          `).join('')}
          <button class="button button-primary" type="submit">Enregistrer le retour</button>
        </form>
      </section>
    `;
  }

  function renderSavReturnView() {
    return `
      <section class="panel">
        <div class="panel-title"><h2>Retour SAV</h2></div>
        <div class="button-row">
          <input id="sav-return-contract-number" placeholder="Numero de contrat">
          <button class="button button-primary" onclick="searchContractForContext('savReturn')">Rechercher</button>
        </div>
      </section>
      <section class="panel">
        <div class="panel-title"><h2>Dossiers a cloturer</h2></div>
        ${renderQuickContractPicker(state.savReturnContracts, 'savReturn')}
      </section>
      ${state.savReturnContract ? renderSavReturnPanel() : ''}
    `;
  }

  function renderSavReturnPanel() {
    const contract = state.savReturnContract;
    const transaction = contract.transaction;
    return `
      <section class="panel">
        <div class="panel-title">
          <h2>${escapeHtml(transaction.contract_number)} · ${escapeHtml(transaction.client_full_name)}</h2>
          <span class="tag tag-${escapeHtml(transaction.status)}">${escapeHtml(transaction.status)}</span>
        </div>
        <p class="muted">Rendu le ${escapeHtml(formatDateShort(transaction.return_date, true))} ${escapeHtml(transaction.return_hour || '')}</p>
        <div class="grid-2">
          <div class="panel inset-panel">
            <div class="panel-title"><h3>Recap retour</h3></div>
            ${renderReturnSummary(contract)}
          </div>
          <div class="panel inset-panel">
            <div class="panel-title"><h3>Action SAV</h3></div>
            <p class="muted">Cette vue sert a rendre la caution et cloturer administrativement le dossier.</p>
            <div class="form-grid">
              <div class="field"><label>Caution remboursee (€)</label><input id="sav-refund-amount" type="number" step="0.01" min="0" value="${parseNumeric(transaction.total_deposit_amount)}"></div>
              <div class="field"><label>Motif</label><input id="sav-close-reason" placeholder="Ex: Remboursement partiel, casse, retenue..."></div>
              <div class="field field-full"><label>Commentaire SAV</label><textarea id="sav-close-comment" placeholder="Commentaires libres, explications, validation..."></textarea></div>
              <div class="field field-full"><label>Scan ticket de caisse</label><input id="sav-ticket-file" type="file" accept=\"image/*,.pdf\"></div>
            </div>
            <div class="inline-actions" style="margin-top:12px;">
              <button class="button button-primary" onclick="closeSavContract()">Valider le retour SAV</button>
            </div>
          </div>
        </div>
      </section>
    `;
  }

  function renderReturnSummary(contract) {
    if (!contract.returns.length) {
      return '<p class="muted">Aucun detail de retour saisi.</p>';
    }
    const stateMap = Object.fromEntries(state.bootstrap.referenceData.returnStates.map(item => [item.id, item.label]));
    return `
      <table>
        <thead><tr><th>Produit</th><th>Etat</th><th>Qte</th><th>Commentaire</th></tr></thead>
        <tbody>
          ${contract.returns.map(item => `

  function syncReturnRow(productId) {
    const row = document.querySelector(`[data-return-row="${productId}"]`);
    if (!row) {
      return true;
    }
    const rentedQty = Number(row.dataset.rentedQty || 0);
    const inputs = Array.from(row.querySelectorAll('input[data-product-id]'));
    const conformeInput = inputs.find(input => input.dataset.autoConforme === 'true');
    const otherInputs = inputs.filter(input => input.dataset.autoConforme !== 'true');
    const otherTotal = otherInputs.reduce((acc, input) => acc + Number(input.value || 0), 0);
    const remaining = rentedQty - otherTotal;
    if (conformeInput) {
      conformeInput.value = Math.max(0, remaining);
    }
    const isValid = remaining >= 0 && (otherTotal + Number(conformeInput ? conformeInput.value : 0)) === rentedQty;
    row.querySelectorAll('input[data-product-id]').forEach(input => {
      input.classList.toggle('input-invalid', !isValid);
    });
    const validation = row.querySelector(`[data-return-validation="${productId}"]`);
    if (validation) {
      validation.textContent = isValid
        ? `Total conforme. ${rentedQty} unite(s) controlee(s).`
        : `Quantites invalides. Il faut totaliser exactement ${rentedQty}.`;
      validation.classList.toggle('validation-error', !isValid);
    }
    return isValid;
  }

  function validateReturnForm() {
    if (!state.driveReturnContract) {
      return false;
    }
    return state.driveReturnContract.items.every(item => syncReturnRow(item.product_id));

  function previewQuote() {
    const payload = collectContractPayload();
    const productsMap = Object.fromEntries(state.bootstrap.referenceData.products.map(item => [item.id, item]));
    const pricingRuleMap = Object.fromEntries(state.bootstrap.referenceData.pricingRules.map(item => [item.id, item]));
    const isWeekend = isWeekendRule(payload.pickup_date, payload.return_date);
    const days = getInclusiveDays(payload.pickup_date, payload.return_date);
    let amount = 0;
    let deposit = 0;
    const targetRuleCode = isWeekend ? 'WEEKEND' : days <= 4 ? 'LTE_4_DAYS' : days <= 10 ? 'LTE_10_DAYS' : '';
    payload.items.forEach(item => {
      const product = productsMap[item.product_id];
      if (!product) return;
      const price = state.bootstrap.referenceData.prices.find(entry => {
        const rule = pricingRuleMap[entry.pricing_rule_id];
        return entry.product_id === item.product_id && rule && rule.code === targetRuleCode;
      });
      deposit += Number(product.deposit_amount || 0) * item.quantity;
      if (price) {
        amount += isWeekend ? Number(price.unit_price_ttc || 0) * item.quantity : Number(price.unit_price_ttc || 0) * item.quantity * days;
      }
    });
    document.getElementById('quote-preview').innerHTML = `
      <strong>Controle rapide</strong><br>
      Regle pressentie: ${isWeekend ? 'week-end' : days <= 4 ? '1 a 4 jours' : days <= 10 ? '5 a 10 jours' : 'invalide'}<br>
      Duree calculee: ${days} jour(s)<br>
      Montant estime: ${formatCurrency(amount)}<br>
      Caution estimee: ${formatCurrency(deposit)}<br>
      Le montant final sera valide cote serveur.
    `;
  }

  async function submitContractForm() {
    const payload = collectContractPayload();
    const availabilityByProduct = await ensureAvailabilityReady_(payload.pickup_date, payload.return_date);
    const stockErrors = [];
    payload.items.forEach(item => {
      const available = Number(availabilityByProduct[item.product_id] || 0);
      const requested = Number(item.quantity || 0);
      if (requested > available) {
        stockErrors.push(`${findProductName(item.product_id)}: ${available} disponible(s) / ${requested} demande(s)`);
      }
    });
    if (stockErrors.length) {
      setStatus(`Stock insuffisant: ${stockErrors.join(' ; ')}`);
      return;
    }
    setStatus('Creation du contrat en cours...');
    try {
      state.currentContract = await runServer('apiCreateContract', payload);
      state.bootstrap.dashboard = await runServer('apiGetDashboardData');
      render();
      setStatus('Contrat cree: ' + state.currentContract.transaction.contract_number);
    } catch (error) {
      setStatus(error.message);
    }
  }

    const base64 = await fileToBase64(file);
    try {
      state.currentContract = await runServer('apiMarkContractSigned', state.currentContract.transaction.id, {
        name: file.name,
        mimeType: file.type,
        base64
      });
      await reloadToDashboard('Contrat signe enregistre.');
    } catch (error) {

  }

    state.uploadTargetMode = 'signed';
    const input = document.getElementById('dashboard-signed-upload-input');
    if (input) {
      input.value = '';
      input.click();
    }
  }

  async function uploadDashboardDocument(event) {
    const file = event.target.files[0];
    if (!file || !state.uploadTargetContractId) {
      return;
    }
    setStatus('Televersement de la piece jointe...');
    const base64 = await fileToBase64(file);
    try {
      await runServer('apiUploadContractDocument', state.uploadTargetContractId, {
        name: file.name,
        mimeType: file.type,
        base64
      });
      await refreshDashboard(true);
      setStatus('Piece jointe televersee.');
    } catch (error) {
      setStatus(error.message);
    } finally {
      state.uploadTargetContractId = null;
      state.uploadTargetMode = 'document';
    }
  }

  async function uploadDashboardSignedDocument(event) {
    const file = event.target.files[0];
    if (!file || !state.uploadTargetContractId) {
      return;
    }
    setStatus('Televersement du contrat signe...');
    const base64 = await fileToBase64(file);
    try {
      await runServer('apiMarkContractSigned', state.uploadTargetContractId, {
        name: file.name,
        mimeType: file.type,
        base64
      });
      await reloadToDashboard('Contrat signe enregistre depuis le dashboard.');
    } catch (error) {
      setStatus(error.message);
    } finally {
      state.uploadTargetContractId = null;
      state.uploadTargetMode = 'document';
    }
  }

  async function forceDashboardSigned(transactionId) {
    setStatus('Passage du contrat en SIGNED...');
    try {
      await runServer('apiForceContractSigned', transactionId);
      await reloadToDashboard('Contrat passe en SIGNED.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function cancelCurrentContract() {
    if (!state.currentContract) {
      return;
    }
    setStatus('Annulation du contrat...');
    try {
      state.currentContract = await runServer('apiCancelContract', state.currentContract.transaction.id);
      await refreshDashboard(true);
      render();
      setStatus('Contrat annule.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function searchContractForContext(context) {
    const inputId = context === 'pickup' ? 'pickup-contract-number' : context === 'driveReturn' ? 'drive-return-contract-number' : 'sav-return-contract-number';
    const contractNumber = document.getElementById(inputId).value.trim();
    if (!contractNumber) {
      setStatus('Saisis un numero de contrat.');
      return;
    }
    await loadContractForContextByNumber(context, contractNumber);
  }

  async function loadContractForContextByNumber(context, contractNumber) {
    setStatus('Recherche du contrat...');
    try {
      const contract = await runServer('apiFindContractByNumber', contractNumber);
      if (context === 'pickup') state.pickupContract = contract;
      if (context === 'driveReturn') state.driveReturnContract = contract;
      if (context === 'savReturn') state.savReturnContract = contract;
      render();
      setStatus('Contrat trouve.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function loadContractForContextById(context, transactionId) {
    setStatus('Chargement du contrat...');
    try {
      const contract = await runServer('apiGetContractById', transactionId);
      if (context === 'pickup') state.pickupContract = contract;
      if (context === 'driveReturn') state.driveReturnContract = contract;
      if (context === 'savReturn') state.savReturnContract = contract;
      render();
      setStatus('Contrat charge.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function markPickedUp() {
    if (!state.pickupContract) {
      return;
    }
    setStatus('Validation du retrait...');
    try {
      state.pickupContract = await runServer('apiMarkPickedUp', state.pickupContract.transaction.id);
      await reloadToDashboard('Depart des marchandises confirme.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function submitReturn() {
    if (!state.driveReturnContract) {
      return;
    }
    if (!validateReturnForm()) {
      setStatus('Les quantites de retour ne correspondent pas.');
      return;
    }
    const productGroups = {};
    document.querySelectorAll('#return-form input[data-product-id]').forEach(input => {
      const productId = input.dataset.productId;
      if (!productGroups[productId]) {
        productGroups[productId] = { product_id: productId, states: [], comment: '' };
      }
      productGroups[productId].states.push({
        state_id: input.dataset.stateId,
        state_label: input.dataset.stateLabel,
        quantity: Number(input.value || 0)
      });
    });
    document.querySelectorAll('#return-form textarea[data-comment-product-id]').forEach(textarea => {
      productGroups[textarea.dataset.commentProductId].comment = textarea.value.trim();
    });
    setStatus('Enregistrement du retour...');
    try {
      state.driveReturnContract = await runServer('apiRecordReturn', {
        transaction_id: state.driveReturnContract.transaction.id,
        items: Object.values(productGroups)
      });
      await reloadToDashboard('Retour enregistre.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function closeSavContract() {
    if (!state.savReturnContract) {
      return;
    }
    setStatus('Cloture du dossier...');
    try {
      const ticketInput = document.getElementById('sav-ticket-file');
      let ticketPayload = null;
      if (ticketInput && ticketInput.files && ticketInput.files[0]) {
        const ticketFile = ticketInput.files[0];
        ticketPayload = {
          name: ticketFile.name,
          mimeType: ticketFile.type,
          base64: await fileToBase64(ticketFile)
        };
      }
      state.savReturnContract = await runServer('apiFinalizeSavReturn', {
        transaction_id: state.savReturnContract.transaction.id,
        refund_amount: parseNumeric(document.getElementById('sav-refund-amount').value),
        reason: document.getElementById('sav-close-reason').value.trim(),
        comment: document.getElementById('sav-close-comment').value.trim(),
        ticket_file: ticketPayload
      });
      await reloadToDashboard('Retour SAV valide. Dossier pret a cloturer.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function closeDashboardContract(transactionId) {
    setStatus('Cloture du dossier...');
    try {
      await runServer('apiCloseContract', { transaction_id: transactionId });
      await reloadToDashboard('Dossier cloture.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function loadStockMatrix() {
    const input = document.getElementById('stock-start-date');
    const startDate = input ? input.value : state.bootstrap.dashboard.today;
    setStatus('Chargement de la fiche de stock...');
    try {
      state.stockMatrixStartDate = startDate || state.bootstrap.dashboard.today;
      state.stockMatrixLoading = true;
      const container = document.getElementById('stock-matrix-container');
      if (container) {
        container.innerHTML = renderStockMatrix();
      }
      state.stockMatrix = await runServerBackground('apiGetStockMatrix', startDate || state.bootstrap.dashboard.today, 14);
      setStatus('Fiche de stock chargee.');
    } catch (error) {
      setStatus(error.message);
    } finally {
      state.stockMatrixLoading = false;
      const container = document.getElementById('stock-matrix-container');
      if (container) {
        container.innerHTML = renderStockMatrix();
      }
    }
  }

  function endContractCreation() {
    state.currentContract = null;
    state.periodAvailability = [];
    state.currentView = 'dashboard';
    render();
    setStatus('Creation de contrat terminee.');
    refreshDashboard(true).catch(error => setStatus(error.message));
  }

  async function submitInventory() {
    const payload = {
      movement_date: document.getElementById('inventory-date').value,
      items: Array.from(document.querySelectorAll('[data-inventory-product]')).map(input => ({
        product_id: input.dataset.inventoryProduct,
        quantity: input.value.trim()
      })).filter(item => item.quantity !== '').map(item => ({
        product_id: item.product_id,
        quantity: Number(item.quantity)
      })).filter(item => !Number.isNaN(item.quantity))
    };
    state.inventoryDate = payload.movement_date;
    if (!payload.items.length) {
      setStatus('Aucune quantite saisie pour l inventaire.');
      return;
    }
    try {
      await runServer('apiRecordInventoryBulk', payload);
      await refreshDashboard(true);
      if (state.currentView === 'stock' && state.stockMatrix) {
        await loadStockMatrix();
      }
      setStatus('Inventaire enregistre.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  function toggleStockProduct(productId) {
    state.stockMatrixHiddenProducts[productId] = !state.stockMatrixHiddenProducts[productId];
    const container = document.getElementById('stock-matrix-container');
    if (container) {
      container.innerHTML = renderStockMatrix();
    }
  }

  function findProductName(productId) {
    const product = state.bootstrap.referenceData.products.find(item => item.id === productId);
    return product ? product.name : productId;
  }

  function findPricingRuleLabel(pricingRuleId) {
    const rule = state.bootstrap.referenceData.pricingRules.find(item => item.id === pricingRuleId);
    return rule ? rule.label : pricingRuleId;
  }

  async function refreshDashboard(shouldRender) {
    state.bootstrap.dashboard = await runServerBackground('apiGetDashboardData');
    if (shouldRender || state.currentView === 'dashboard') {
      render();
    }
  }

  async function loadContractsForView(targetKey, statuses, token) {
    setStatus('Chargement des contrats...');
    try {
      const rows = await runServerBackground('apiListContractsByStatuses', statuses);
      if (token && token !== state.viewLoadToken) {
        return;
      }
      state[targetKey] = rows;
      if (
        (targetKey === 'pickupContracts' && state.currentView === 'drive-pickup') ||
        (targetKey === 'driveReturnContracts' && state.currentView === 'drive-return') ||
        (targetKey === 'savReturnContracts' && state.currentView === 'sav-return')
      ) {
        render();
      }
      setStatus('Contrats charges.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function refreshAllData() {
    setStatus('Rafraichissement des donnees...');
    try {
      await refreshDashboard(state.currentView === 'dashboard');
      if (state.currentView === 'drive-pickup') {
        await loadContractsForView('pickupContracts', ['signed']);
      }
      if (state.currentView === 'drive-return') {
        await loadContractsForView('driveReturnContracts', ['picked_up', 'late', 'incident']);
      }
      if (state.currentView === 'sav-return') {
        await loadContractsForView('savReturnContracts', ['returned', 'incident', 'late']);
      }
      if (state.currentView === 'stock' && state.stockMatrix) {
        await loadStockMatrix();
      }
      setStatus('Donnees rafraichies.');
    } catch (error) {
      setStatus(error.message);
    }
  }

  async function reloadToDashboard(message) {
    state.currentContract = null;
    state.pickupContract = null;
    state.driveReturnContract = null;
    state.savReturnContract = null;
    state.periodAvailability = [];
    state.periodAvailabilityKey = '';
    state.currentView = 'dashboard';
    state.adminDataLoaded = false;
    await boot();
    setStatus(message);
  }

  async function ensureAvailabilityReady_(pickupDate, returnDate) {
    if (!pickupDate || !returnDate) {
      return {};
    }
    const key = `${pickupDate}|${returnDate}`;
    if (state.periodAvailabilityKey !== key || !state.periodAvailability.length) {
      state.periodAvailability = await runServerBackground('apiGetPeriodAvailability', pickupDate, returnDate);
      state.periodAvailabilityKey = key;
      updatePeriodAvailabilityUi();
    }
    return Object.fromEntries((state.periodAvailability || []).map(item => [item.product_id, Number(item.available || 0)]));
  }

  function formatStateLabel(value) {
    const map = {
      'conforme': 'Conforme',
      'sale': 'Sale',
      'abime': 'Abimé',
      'casse': 'Cassé',
      'manquant': 'Manquant'
    };
    return map[String(value || '').toLowerCase()] || value;
  }

  function escapeHtml(value) {
    return String(value || '')
      .replace(/&/g, '&amp;')
      .replace(/</g, '&lt;')
      .replace(/>/g, '&gt;')
      .replace(/"/g, '&quot;')
      .replace(/'/g, '&#039;');
  }

  function fileToBase64(file) {
    return new Promise((resolve, reject) => {
      const reader = new FileReader();
      reader.onload = () => resolve(String(reader.result).split(',')[1]);
      reader.onerror = reject;
      reader.readAsDataURL(file);
    });
  }

  function isWeekendRule(startDate, endDate) {
    if (!startDate || !endDate) {
      return false;
    }
    const start = new Date(startDate);
    const end = new Date(endDate);
    const diff = Math.round((end - start) / 86400000);
    return start.getDay() === 5 && end.getDay() === 1 && diff === 3;
  }

  function getInclusiveDays(startDate, endDate) {
    if (!startDate || !endDate) {
      return 0;
    }
    const start = new Date(startDate);
    const end = new Date(endDate);
    return Math.round((end - start) / 86400000) + 1;
  }

  boot().catch(error => {
    document.getElementById('app').innerHTML = `<div class="panel"><h2>Erreur de chargement</h2><pre>${escapeHtml(error.message)}</pre></div>`;
  });
</script>
